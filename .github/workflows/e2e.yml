name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build

      - name: Start server
        run: |
          ./target/debug/rust-blog &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/posts > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Smoke test endpoints
        run: |
          curl -sf http://127.0.0.1:3000/
          curl -sf http://127.0.0.1:3000/posts
          curl -sf http://127.0.0.1:3000/posts/2024-q1/monorepos-were-a-mistake

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" || true
