# Deploys to oakheightsllc/rust-blog on Vercel.
# Requires GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (Get org/project IDs from oakheightsllc team: vercel link in that project, or from project Settings)
name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "middleware.ts"
      - "next.config.ts"
      - "package.json"
      - "bun.lock"
      - "vercel.json"
      - ".github/workflows/deploy-vercel.yml"

jobs:
  deploy:
    name: Deploy to oakheightsllc
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel env
        run: bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
