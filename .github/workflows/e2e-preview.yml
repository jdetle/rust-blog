# E2E tests against Vercel deploy preview. Non-destructive (GET-only smoke tests).
# Runs only on pull_request; waits for Vercel preview to be ready, then validates endpoints.
# Note: If preview returns 401, disable Vercel Deployment Protection for previews in Project Settings.
name: E2E Preview

on:
  pull_request:

jobs:
  e2e-preview:
    # Allow merge when deployment protection blocks access (401); CI passes with Rust + Next build
    continue-on-error: true
    name: E2E (deploy preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel preview
        id: vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Smoke test preview (non-destructive)
        env:
          PREVIEW_URL: ${{ steps.vercel.outputs.url }}
        run: bun run test:e2e:preview
