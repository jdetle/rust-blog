# E2E tests against Vercel deploy preview. Non-destructive (GET-only smoke tests).
# Requires VERCEL_AUTOMATION_BYPASS_SECRET in repo secrets when deployment protection is enabled.
#
# Optional PostHog ingestion check (after smoke): set POSTHOG_PERSONAL_API_KEY and
# POSTHOG_PROJECT_ID as repository secrets so preview traffic is visible in PostHog Query API.
name: E2E Preview

on:
  pull_request:

jobs:
  e2e-preview:
    name: E2E (deploy preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel preview
        id: vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 5
          vercel_protection_bypass_header: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Smoke test preview (non-destructive)
        env:
          PREVIEW_URL: ${{ steps.vercel.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: bun run test:e2e:preview

      # Optional: verify read/list APIs when repo secrets are set (GET-only / HogQL).
      - name: Verify analytics read APIs
        if: ${{ (secrets.POSTHOG_PERSONAL_API_KEY != '' && secrets.POSTHOG_PROJECT_ID != '') || secrets.CLARITY_EXPORT_TOKEN != '' || secrets.ANALYTICS_API_URL != '' || (secrets.PLAUSIBLE_API_KEY != '' && (secrets.PLAUSIBLE_SITE_ID != '' || secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN != '')) }}
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          CLARITY_EXPORT_TOKEN: ${{ secrets.CLARITY_EXPORT_TOKEN }}
          CLARITY_EXPORT_URL: ${{ secrets.CLARITY_EXPORT_URL }}
          PLAUSIBLE_API_KEY: ${{ secrets.PLAUSIBLE_API_KEY }}
          PLAUSIBLE_SITE_ID: ${{ secrets.PLAUSIBLE_SITE_ID }}
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
          ANALYTICS_API_URL: ${{ secrets.ANALYTICS_API_URL }}
          POSTHOG_VERIFY_HOURS: ${{ vars.POSTHOG_VERIFY_HOURS }}
          POSTHOG_VERIFY_ATTEMPTS: ${{ vars.POSTHOG_VERIFY_ATTEMPTS }}
          POSTHOG_VERIFY_DELAY_MS: ${{ vars.POSTHOG_VERIFY_DELAY_MS }}
        run: bun run verify:analytics-read-apis
