# Builds Dockerfile (Rust multi-stage) via ACR Quick Tasks, then deploys to Azure Container Apps.
# Uses ubuntu-latest (OIDC + Azure CLI) so deploys do not depend on org self-hosted runners.
# `az acr build` sends the build context to ACR and builds there — no Docker daemon required.
#
# First-run: creates cae-rust-blog (Container Apps Environment) and ca-rust-blog in rg-rust-blog.
# Subsequent runs: updates ca-rust-blog image only (idempotent).
#
# Required secrets (set by jdetle/platform scripts/set-github-secrets-from-azure-env.sh):
#   AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_ID
#   AZURE_RESOURCE_GROUP (rg-rust-blog), PLATFORM_ACR, PRISM_INGEST_URL, PRISM_API_KEY
#   ANTHROPIC_API_KEY

name: deploy-azure

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (empty = short git SHA)"
        required: false
        default: ""

concurrency:
  group: deploy-azure-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: rust-blog
  CONTAINER_APP: ca-rust-blog
  CAE_NAME: cae-rust-blog
  LOCATION: eastus2

permissions:
  id-token: write
  contents: read

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install containerapp extension
        run: az extension add --name containerapp --upgrade --yes 2>/dev/null || true

      - name: Image tag
        id: meta
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push via ACR Tasks
        env:
          PLATFORM_ACR: ${{ secrets.PLATFORM_ACR }}
          PLATFORM_SUB_ID: ${{ secrets.PLATFORM_SUB_ID }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          ACR_NAME="${PLATFORM_ACR%%.*}"
          # ACR lives in the platform subscription; SP has Contributor on it.
          # Pass --subscription explicitly so az acr build finds the registry
          # regardless of which subscription this workflow is logged into.
          az acr build \
            --registry "$ACR_NAME" \
            --subscription "$PLATFORM_SUB_ID" \
            --image "${APP_NAME}:${TAG}" \
            --file Dockerfile \
            .
          echo "IMAGE=${PLATFORM_ACR}/${APP_NAME}:${TAG}" >> "$GITHUB_ENV"

      - name: Ensure Container Apps Environment
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          az provider register -n Microsoft.OperationalInsights --wait &
          az provider register -n Microsoft.App --wait &
          wait
          if ! az containerapp env show --name "$CAE_NAME" --resource-group "$RG" &>/dev/null; then
            echo "Creating Container Apps Environment: $CAE_NAME"
            az containerapp env create \
              --name "$CAE_NAME" \
              --resource-group "$RG" \
              --location "$LOCATION" \
              --logs-destination none \
              --output none
          else
            echo "CAE exists: $CAE_NAME"
          fi

      - name: Deploy Container App
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          PLATFORM_ACR: ${{ secrets.PLATFORM_ACR }}
          PRISM_INGEST_URL: ${{ secrets.PRISM_INGEST_URL }}
          PRISM_API_KEY: ${{ secrets.PRISM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          IDENTITY_ID=$(az identity show \
            --name "id-rust-blog" \
            --resource-group "$RG" \
            --query id -o tsv)

          if ! az containerapp show --name "$CONTAINER_APP" --resource-group "$RG" &>/dev/null; then
            echo "Creating Container App: $CONTAINER_APP"
            az containerapp create \
              --name "$CONTAINER_APP" \
              --resource-group "$RG" \
              --environment "$CAE_NAME" \
              --image "$IMAGE" \
              --target-port 8080 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 3 \
              --user-assigned "$IDENTITY_ID" \
              --registry-server "$PLATFORM_ACR" \
              --registry-identity "$IDENTITY_ID" \
              --env-vars \
                "RUST_LOG=info" \
                "PRISM_INGEST_URL=${PRISM_INGEST_URL}" \
                "PRISM_API_KEY=secretref:prism-api-key" \
                "ANTHROPIC_API_KEY=secretref:anthropic-api-key" \
                "OTEL_SERVICE_NAME=rust-blog" \
              --secrets \
                "prism-api-key=${PRISM_API_KEY}" \
                "anthropic-api-key=${ANTHROPIC_API_KEY}" \
              --output none
          else
            echo "Reconciling registry auth on: $CONTAINER_APP"
            az containerapp registry set \
              --name "$CONTAINER_APP" \
              --resource-group "$RG" \
              --server "$PLATFORM_ACR" \
              --identity "$IDENTITY_ID" \
              --output none
            echo "Upserting secrets on: $CONTAINER_APP"
            az containerapp secret set \
              --name "$CONTAINER_APP" \
              --resource-group "$RG" \
              --secrets \
                "prism-api-key=${PRISM_API_KEY}" \
                "anthropic-api-key=${ANTHROPIC_API_KEY}" \
              --output none
            echo "Updating image and env vars: $CONTAINER_APP"
            az containerapp update \
              --name "$CONTAINER_APP" \
              --resource-group "$RG" \
              --image "$IMAGE" \
              --set-env-vars \
                "RUST_LOG=info" \
                "PRISM_INGEST_URL=${PRISM_INGEST_URL}" \
                "PRISM_API_KEY=secretref:prism-api-key" \
                "ANTHROPIC_API_KEY=secretref:anthropic-api-key" \
                "OTEL_SERVICE_NAME=rust-blog" \
              --output none
          fi
          URL=$(az containerapp show \
            --name "$CONTAINER_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "n/a")
          echo "Deployed: $CONTAINER_APP → https://${URL}"
