name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check
        timeout-minutes: 3
      - name: Clippy
        run: cargo clippy -- -D warnings
        timeout-minutes: 3
      - name: Test
        run: cargo test
        timeout-minutes: 5
      - name: Build benches
        run: cargo build --benches
        timeout-minutes: 3
      - name: Build release
        run: cargo build --release
        timeout-minutes: 10

  next:
    name: Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install
        run: bun install --frozen-lockfile
        timeout-minutes: 2

      - name: Unit tests (lib)
        run: bash scripts/test-ci.sh
        timeout-minutes: 2

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('**/*.tsx', '**/*.ts', '**/*.css') }}
          restore-keys: |
            nextjs-${{ hashFiles('bun.lock') }}-
            nextjs-

      - name: Build
        run: bun run build
        timeout-minutes: 5
