# Builds the Next.js frontend with bun on the CI runner and deploys it to
# Azure Container Apps as ca-rust-blog-web in cae-rust-blog.
#
# Build flow:
#   1. bun install + bun run build  (NEXT_PUBLIC_* baked into bundle here)
#   2. Assemble minimal Docker context from .next/standalone + .next/static
#   3. docker build Dockerfile.frontend (runtime-only node:22-alpine image)
#   4. docker push to ACR, then az containerapp create/update
#
# Runtime secrets (TURNSTILE_SECRET_KEY, POSTHOG_PERSONAL_API_KEY) are
# injected by the Container App via secretref — never needed at build time.
#
# Required secrets (shared with deploy-azure.yml):
#   AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_ID
#   AZURE_RESOURCE_GROUP   — rg-rust-blog
#   PLATFORM_ACR           — full ACR login server (e.g. myacr.azurecr.io)
#   PLATFORM_SUB_ID        — subscription that owns the ACR
#   KEY_VAULT_NAME         — kvrustblog2bb8 (holds turnstile-secret-key, posthog-api-key)
#
# Optional fallback GitHub secrets (used when KV secret is absent):
#   TURNSTILE_SECRET_KEY, POSTHOG_PERSONAL_API_KEY

name: deploy-frontend-azure

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "posts/**"
      - "styles/**"
      - "package.json"
      - "bun.lock"
      - "next.config.ts"
      - "tsconfig.json"
      - "tailwind.config.*"
      - "Dockerfile.frontend"
      - ".github/workflows/deploy-frontend-azure.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (empty = short git SHA)"
        required: false
        default: ""

concurrency:
  group: deploy-frontend-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  FRONTEND_IMAGE: rust-blog-web
  CONTAINER_APP: ca-rust-blog-web
  CAE_NAME: cae-rust-blog
  LOCATION: eastus2

permissions:
  id-token: write
  contents: read

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install containerapp extension
        run: az extension add --name containerapp --upgrade --yes 2>/dev/null || true

      - name: Fetch secrets (Key Vault preferred, GitHub secret fallback)
        env:
          KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
          TURNSTILE_SECRET_KEY_GH: ${{ secrets.TURNSTILE_SECRET_KEY }}
          POSTHOG_PERSONAL_API_KEY_GH: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
        run: |
          kv_get() {
            local secret_name="$1"
            if [ -n "$KEY_VAULT_NAME" ]; then
              az keyvault secret show \
                --vault-name "$KEY_VAULT_NAME" \
                --name "$secret_name" \
                --query value -o tsv 2>/dev/null || true
            fi
          }

          TURNSTILE_SECRET_KEY="${TURNSTILE_SECRET_KEY_GH}"
          kv_val="$(kv_get "turnstile-secret-key")"
          [ -n "$kv_val" ] && TURNSTILE_SECRET_KEY="$kv_val"
          if [ -z "$TURNSTILE_SECRET_KEY" ]; then
            echo "ERROR: TURNSTILE_SECRET_KEY not found in Key Vault ('turnstile-secret-key') or GitHub secrets." >&2
            exit 1
          fi
          echo "::add-mask::${TURNSTILE_SECRET_KEY}"
          echo "TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}" >> "$GITHUB_ENV"

          POSTHOG_PERSONAL_API_KEY="${POSTHOG_PERSONAL_API_KEY_GH}"
          kv_val="$(kv_get "posthog-api-key")"
          [ -n "$kv_val" ] && POSTHOG_PERSONAL_API_KEY="$kv_val"
          echo "::add-mask::${POSTHOG_PERSONAL_API_KEY}"
          echo "POSTHOG_PERSONAL_API_KEY=${POSTHOG_PERSONAL_API_KEY}" >> "$GITHUB_ENV"

      - name: Image tag
        id: meta
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js
        env:
          NEXT_PUBLIC_POSTHOG_KEY: "phc_sOf9IR0gRco70ZVGBwuP8ZNTlbJkw1on9FNeVV1xNtp"
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.posthog.com"
          NEXT_PUBLIC_GA4_ID: "G-S217MS7QDZ"
          NEXT_PUBLIC_CLARITY_ID: "vx6vutcs1m"
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: "jdetle.com"
          NEXT_PUBLIC_PLAUSIBLE_SCRIPT_ID: "pa-HRDk6uSQvdeP6j3mL0toe"
          NEXT_PUBLIC_META_PIXEL_ID: "169560873691070"
          NEXT_PUBLIC_SITE_URL: "https://jdetle.com"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAAC_y5h9W44gaxQtB"
        run: bun run build

      - name: Assemble Docker context
        run: |
          # Collect only the files the runtime image needs — avoids sending
          # the full repo to the Docker daemon and sidesteps .dockerignore issues.
          mkdir -p _deploy/.next
          cp -r .next/standalone/. _deploy/
          cp -r .next/static     _deploy/.next/static
          # public/ is optional; create an empty dir if the project has none.
          mkdir -p _deploy/public
          [ -d public ] && cp -r public/. _deploy/public/ || true

      - name: Login to ACR
        env:
          PLATFORM_ACR: ${{ secrets.PLATFORM_ACR }}
          PLATFORM_SUB_ID: ${{ secrets.PLATFORM_SUB_ID }}
        run: |
          ACR_NAME="${PLATFORM_ACR%%.*}"
          az acr login --name "$ACR_NAME" --subscription "$PLATFORM_SUB_ID"

      - name: Build and push Docker image
        env:
          PLATFORM_ACR: ${{ secrets.PLATFORM_ACR }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          IMAGE="${PLATFORM_ACR}/${FRONTEND_IMAGE}:${TAG}"
          docker build --file Dockerfile.frontend --tag "$IMAGE" _deploy/
          docker push "$IMAGE"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Resolve backend URL
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          FQDN=$(az containerapp show \
            --name ca-rust-blog \
            --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "BACKEND_URL=https://${FQDN}" >> "$GITHUB_ENV"

      - name: Deploy Container App
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          PLATFORM_ACR: ${{ secrets.PLATFORM_ACR }}
          # TURNSTILE_SECRET_KEY, POSTHOG_PERSONAL_API_KEY, BACKEND_URL, IMAGE set above
        run: |
          IDENTITY_ID=$(az identity show \
            --name "id-rust-blog" \
            --resource-group "$RG" \
            --query id -o tsv)

          COMMON_SECRETS=(
            "turnstile-secret-key=${TURNSTILE_SECRET_KEY}"
          )
          COMMON_ENV=(
            "NODE_ENV=production"
            "PORT=3000"
            "ANALYTICS_API_URL=${BACKEND_URL}"
            "RUST_API_URL=${BACKEND_URL}"
            "POSTHOG_PROJECT_ID=346322"
            "TURNSTILE_SECRET_KEY=secretref:turnstile-secret-key"
          )

          if [ -n "$POSTHOG_PERSONAL_API_KEY" ]; then
            COMMON_SECRETS+=("posthog-personal-api-key=${POSTHOG_PERSONAL_API_KEY}")
            COMMON_ENV+=("POSTHOG_PERSONAL_API_KEY=secretref:posthog-personal-api-key")
          fi

          if ! az containerapp show --name "$CONTAINER_APP" --resource-group "$RG" &>/dev/null; then
            echo "Creating Container App: $CONTAINER_APP"
            az containerapp create \
              --name "$CONTAINER_APP" \
              --resource-group "$RG" \
              --environment "$CAE_NAME" \
              --image "$IMAGE" \
              --target-port 3000 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 3 \
              --user-assigned "$IDENTITY_ID" \
              --registry-server "$PLATFORM_ACR" \
              --registry-identity "$IDENTITY_ID" \
              --secrets "${COMMON_SECRETS[@]}" \
              --env-vars "${COMMON_ENV[@]}" \
              --output none
          else
            echo "Reconciling registry auth on: $CONTAINER_APP"
            az containerapp registry set \
              --name "$CONTAINER_APP" \
              --resource-group "$RG" \
              --server "$PLATFORM_ACR" \
              --identity "$IDENTITY_ID" \
              --output none
            echo "Upserting secrets on: $CONTAINER_APP"
            az containerapp secret set \
              --name "$CONTAINER_APP" \
              --resource-group "$RG" \
              --secrets "${COMMON_SECRETS[@]}" \
              --output none
            echo "Updating image and env vars: $CONTAINER_APP"
            az containerapp update \
              --name "$CONTAINER_APP" \
              --resource-group "$RG" \
              --image "$IMAGE" \
              --set-env-vars "${COMMON_ENV[@]}" \
              --output none
          fi

          URL=$(az containerapp show \
            --name "$CONTAINER_APP" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "n/a")
          echo "Deployed: $CONTAINER_APP → https://${URL}"
