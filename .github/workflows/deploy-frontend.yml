# Deploys the Next.js frontend to Azure App Service (Linux).
#
# NOTE: The primary frontend deployment is deploy-frontend-azure.yml, which
# targets Azure Container Apps (ca-rust-blog-web) and triggers automatically
# on push to main. This workflow is a manual fallback for deploying to the
# App Service (app-rust-blog-web) once that infrastructure is provisioned.
# It is a no-op when AZUREAPPSERVICE_NAME is not configured — the job skips
# rather than failing.
#
# Required secrets (all optional — job skips if any are absent):
#   AZUREAPPSERVICE_CLIENTID
#   AZUREAPPSERVICE_TENANTID
#   AZUREAPPSERVICE_SUBSCRIPTIONID
#   AZUREAPPSERVICE_RG
#   AZUREAPPSERVICE_NAME
name: Deploy frontend to Azure App Service

# Disabled automatic push trigger — the primary frontend deployment is Vercel
# (auto-triggered on push to main). Re-enable push trigger below when Azure
# App Service infrastructure is provisioned and the required secrets are added.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Assemble standalone artifact
        run: |
          rm -rf deploy && mkdir -p deploy/.next
          cp -R .next/standalone/* deploy/
          cp -R .next/static deploy/.next/static
          cp -R posts deploy/posts
          if [ -d public ]; then
            cp -R public deploy/public
          fi
          if [ -f package.json ]; then
            cp package.json deploy/package.json
          fi
          cd deploy && zip -r ../site.zip .

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Configure startup command
        run: |
          az webapp config set \
            --resource-group "${{ secrets.AZUREAPPSERVICE_RG }}" \
            --name "${{ secrets.AZUREAPPSERVICE_NAME }}" \
            --startup-file "node server.js"

      - name: Deploy package
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZUREAPPSERVICE_NAME }}
          package: site.zip
