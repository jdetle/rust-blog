# Builds the Next.js frontend as a standalone Node app and deploys it to
# Azure App Service (Linux). The Rust analytics service remains on Azure
# Container Apps via deploy-azure.yml.
#
# Required secrets:
#   AZUREAPPSERVICE_CLIENTID
#   AZUREAPPSERVICE_TENANTID
#   AZUREAPPSERVICE_SUBSCRIPTIONID
#   AZUREAPPSERVICE_RG
#   AZUREAPPSERVICE_NAME
#
# Required App Service app settings:
#   SCM_DO_BUILD_DURING_DEPLOYMENT=false
#   WEBSITE_RUN_FROM_PACKAGE=1
#   PORT=8080
#
# Recommended startup command in Azure:
#   node server.js
name: Deploy frontend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "middleware.ts"
      - "next.config.ts"
      - "package.json"
      - "bun.lockb"
      - "posts/**"
      - "lib/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Assemble standalone artifact
        run: |
          rm -rf deploy && mkdir -p deploy/.next
          cp -R .next/standalone/* deploy/
          cp -R .next/static deploy/.next/static
          cp -R posts deploy/posts
          if [ -d public ]; then
            cp -R public deploy/public
          fi
          if [ -f package.json ]; then
            cp package.json deploy/package.json
          fi
          cd deploy && zip -r ../site.zip .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Configure startup command
        run: |
          az webapp config set \
            --resource-group "${{ secrets.AZUREAPPSERVICE_RG }}" \
            --name "${{ secrets.AZUREAPPSERVICE_NAME }}" \
            --startup-file "node server.js"

      - name: Deploy package
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZUREAPPSERVICE_NAME }}
          package: site.zip
